services:
  - type: web
    name: printflow-3d
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: OWNER_BOOTSTRAP_EMAIL
        value: gutemberggg10@gmail.com
      - key: OWNER_BOOTSTRAP_NAME
        value: Guto
      - key: OWNER_BOOTSTRAP_PHONE
        value: 64996435078
      - key: OWNER_BOOTSTRAP_PASSWORD
        sync: false
